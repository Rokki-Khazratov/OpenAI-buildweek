services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openai_buildweek}
      POSTGRES_USER: ${POSTGRES_USER:-examtwin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env.production}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env.production}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/$$APP_STORAGE_BUCKET && mc anonymous set none local/$$APP_STORAGE_BUCKET"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      APP_STORAGE_BUCKET: ${APP_STORAGE_BUCKET:-examtwin-artifacts}

  migrate:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment: &api_environment
      APP_ENVIRONMENT: production
      APP_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-examtwin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openai_buildweek}
      APP_REDIS_URL: redis://redis:6379/0
      APP_JWT_SECRET: ${APP_JWT_SECRET:?set APP_JWT_SECRET in .env.production}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:?set APP_CORS_ORIGINS in .env.production}
      APP_STORAGE_ENDPOINT_URL: http://minio:9000
      APP_STORAGE_PUBLIC_ENDPOINT_URL: ${APP_STORAGE_PUBLIC_ENDPOINT_URL:?set APP_STORAGE_PUBLIC_ENDPOINT_URL in .env.production}
      APP_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER}
      APP_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      APP_STORAGE_BUCKET: ${APP_STORAGE_BUCKET:-examtwin-artifacts}
      APP_AI_ENABLED: ${APP_AI_ENABLED:-true}
      APP_VERTEX_PROJECT: ${APP_VERTEX_PROJECT:-}
      APP_VERTEX_LOCATION: ${APP_VERTEX_LOCATION:-global}
      APP_VERTEX_GENERATION_MODEL: ${APP_VERTEX_GENERATION_MODEL:-gemini-3.5-flash}
      GOOGLE_APPLICATION_CREDENTIALS: /var/secrets/google/application_default_credentials.json
      PYTHONPATH: /app/api
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH:-./secrets/application_default_credentials.json}:/var/secrets/google/application_default_credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    restart: unless-stopped
    environment: *api_environment
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH:-./secrets/application_default_credentials.json}:/var/secrets/google/application_default_credentials.json:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    restart: unless-stopped
    command: ["dramatiq", "app.modules.artifacts.tasks", "--processes", "1", "--threads", "4"]
    environment:
      <<: *api_environment
      PYTHONPATH: /app/api:/app
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH:-./secrets/application_default_credentials.json}:/var/secrets/google/application_default_credentials.json:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      API_URL: http://api:8000/api/v1
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
