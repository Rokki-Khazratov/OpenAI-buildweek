services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: openai_buildweek
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openai_buildweek"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://127.0.0.1:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/examtwin-artifacts &&
      mc anonymous set none local/examtwin-artifacts"

  api:
    build:
      context: ..
      dockerfile: backend/api/Dockerfile
    environment:
      APP_ENVIRONMENT: local
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/openai_buildweek
      APP_REDIS_URL: redis://redis:6379/0
      APP_STORAGE_ENDPOINT_URL: http://minio:9000
      APP_STORAGE_PUBLIC_ENDPOINT_URL: http://localhost:9000
      APP_STORAGE_ACCESS_KEY: minioadmin
      APP_STORAGE_SECRET_KEY: minioadmin
      APP_STORAGE_BUCKET: examtwin-artifacts
      PYTHONPATH: /app/api
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    volumes:
      - ./api:/app/api
    ports:
      - "${API_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: ..
      dockerfile: backend/api/Dockerfile
    environment:
      APP_ENVIRONMENT: local
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/openai_buildweek
      APP_REDIS_URL: redis://redis:6379/0
      APP_STORAGE_ENDPOINT_URL: http://minio:9000
      APP_STORAGE_PUBLIC_ENDPOINT_URL: http://localhost:9000
      APP_STORAGE_ACCESS_KEY: minioadmin
      APP_STORAGE_SECRET_KEY: minioadmin
      APP_STORAGE_BUCKET: examtwin-artifacts
      PYTHONPATH: /app/api:/app
    command: ["dramatiq", "app.modules.artifacts.tasks"]
    volumes:
      - ./api:/app/api
      - ./worker:/app/worker
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
