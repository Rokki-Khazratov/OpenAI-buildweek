services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: openai_buildweek
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openai_buildweek"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ..
      dockerfile: backend/api/Dockerfile
    environment:
      APP_ENVIRONMENT: local
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/openai_buildweek
      PYTHONPATH: /app/api
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    volumes:
      - ./api:/app/api
    ports:
      - "${API_PORT:-8010}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
